<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexCode</title>
    <style>
      /* Edge-to-edge workbench, no page scrollbars or border gap. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #nexcode-workbench {
        height: 100vh;
        width: 100vw;
      }
      /* Reserve space for the macOS traffic lights + the NexCode title-bar mark
         (the native title bar is hidden — see tauri.conf.json). */
      .monaco-workbench .part.titlebar > .titlebar-container {
        padding-left: 168px;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
